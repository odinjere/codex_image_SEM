<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEM Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-logo">SEM Viewer</span><div class="titlebar-sep"></div><span class="titlebar-file" id="titlebar-file">No file open</span><div class="titlebar-right">v0.1.0-alpha</div>
  </div>
  <div class="toolbar">
    <button id="btn-open" class="btn">Open</button><button id="btn-fit" class="btn">Fit</button><button id="btn-zoom-in" class="btn">+</button><button id="btn-zoom-out" class="btn">−</button>
    <button class="btn active" data-tool="pan">Pan</button><button class="btn" data-tool="measure-distance">Dist</button><button class="btn" data-tool="measure-area">Area</button><button class="btn" data-tool="measure-angle">Angle</button>
    <button id="btn-export-csv" class="btn">Export CSV</button><button id="btn-export-csv-2" class="btn">Export CSV</button>
  </div>
  <div class="main-layout">
    <div class="canvas-area">
      <canvas id="main-canvas"></canvas>
      <div class="canvas-drop-zone" id="drop-zone">Drop SEM image or click Open</div>
      <div id="loading-overlay" class="hidden"><div class="spinner"></div><div class="loading-message">Cargando...</div></div>
    </div>
    <div class="right-panel">
      <div class="panel-tabs">
        <button class="panel-tab active" data-panel="histogram">Histogram</button>
        <button class="panel-tab" data-panel="measurements">Measurements</button>
        <button class="panel-tab" data-panel="particles">Particles</button>
        <button class="panel-tab" data-panel="metadata">Metadata</button>
      </div>
      <div data-panel-content="histogram">
        <div id="histogram-container"></div>
        <input id="gamma-slider" type="range" min="0.1" max="4" step="0.01" value="1"><span id="gamma-value">1.00</span>
        <button id="btn-hist-eq" class="btn">Hist EQ</button><button id="btn-contrast-reset" class="btn">Reset</button>
      </div>
      <div data-panel-content="measurements" class="hidden"><div id="measurements-list"></div><button id="btn-clear-measurements" class="btn">Clear</button></div>
      <div data-panel-content="particles" class="hidden">
        <input id="particle-threshold" type="range" min="0" max="255" value="120"><span id="thresh-val">120</span>
        <input id="particle-min-area" type="number" value="10">
        <label><input id="dark-particles" type="checkbox">Dark</label>
        <button id="btn-detect-particles" class="btn">Detect</button>
        <div id="particles-list"></div>
      </div>
      <div data-panel-content="metadata" class="hidden"><div id="metadata-content"></div></div>
    </div>
  </div>
  <div class="statusbar"><span id="status-bar">Ready</span></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
